<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Track your expenses and net worth in one place">
    <meta name="theme-color" content="#3b82f6">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' https://*.supabase.co https://api.mfapi.in https://api.coingecko.com https://api.allorigins.win https://www.amfiindia.com https://open.er-api.com; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com;">
    <title>Personal Finance Manager</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-192.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&family=Fraunces:ital,wght@0,300;0,400;1,300&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./styles/main.css">
    <link rel="stylesheet" href="./styles/mf-tracker.css">
</head>

<body>
    <div class="app-container" style="display: none;">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1><span class="sidebar-logo-icon">💰</span><span class="sidebar-logo-text"> Networth Tracker</span>
                </h1>
            </div>

            <nav class="sidebar-nav">
                <div class="sidebar-item active" data-tab="dashboard" onclick="window.app.switchTab('dashboard')">
                    <span class="sidebar-icon">📊</span><span class="sidebar-label">Dashboard</span>
                </div>
                <div class="sidebar-item" data-tab="savings" onclick="window.app.switchTab('savings')">
                    <span class="sidebar-icon">🏦</span><span class="sidebar-label">Savings</span>
                </div>
                <div class="sidebar-item" data-tab="fixedDeposits" onclick="window.app.switchTab('fixedDeposits')">
                    <span class="sidebar-icon">🐷</span><span class="sidebar-label">Fixed Deposits</span>
                </div>
                <div class="sidebar-item" data-tab="mutualFunds" onclick="window.app.switchTab('mutualFunds')">
                    <span class="sidebar-icon">📜</span><span class="sidebar-label">Mutual Funds</span>
                </div>
                <div class="sidebar-item" data-tab="stocks" onclick="window.app.switchTab('stocks')">
                    <span class="sidebar-icon">📈</span><span class="sidebar-label">Stocks & ETFs</span>
                </div>
                <div class="sidebar-item" data-tab="crypto" onclick="window.app.switchTab('crypto')">
                    <span class="sidebar-icon">🪙</span><span class="sidebar-label">Crypto</span>
                </div>
                <div class="sidebar-item" data-tab="liabilities" onclick="window.app.switchTab('liabilities')">
                    <span class="sidebar-icon">📋</span><span class="sidebar-label">Liabilities</span>
                </div>
                <div class="sidebar-item" data-tab="creditCards" onclick="window.app.switchTab('creditCards')">
                    <span class="sidebar-icon">💳</span><span class="sidebar-label">Credit Cards</span>
                </div>
                <!-- <div class="sidebar-item" data-tab="expenses" onclick="window.app.switchTab('expenses')">
                    <span class="sidebar-icon">💸</span><span class="sidebar-label">Expenses</span>
                </div> -->
                <!-- <div class="sidebar-item" data-tab="budgets" onclick="window.app.switchTab('budgets')">
                    <span class="sidebar-icon">🧭</span><span class="sidebar-label">Budgets</span>
                </div> -->
                <div class="sidebar-item" data-tab="rebalancing" onclick="window.app.switchTab('rebalancing')">
                    <span class="sidebar-icon">⚖️</span><span class="sidebar-label">Rebalancing</span>
                </div>
                <div class="sidebar-separator"></div>
                <div class="sidebar-item" onclick="window.app.showSettings()">
                    <span class="sidebar-icon">⚙️</span><span class="sidebar-label">Settings</span>
                </div>
                <div class="sidebar-item" id="themeToggle">
                    <span class="sidebar-icon" id="themeIcon">🌙</span><span class="sidebar-label">Toggle Theme</span>
                </div>
                <div class="sidebar-item" onclick="window.app.signOut()">
                    <span class="sidebar-icon">🚪</span><span class="sidebar-label">Sign Out</span>
                </div>
            </nav>
        </aside>

        <button id="sidebarToggle" class="sidebar-toggle-btn" aria-label="Toggle menu" aria-expanded="false">☰</button>
        <div id="sidebarBackdrop" class="sidebar-backdrop"></div>

        <main class="main-content">
            <div id="content-dashboard" class="content active"></div>
            <div id="content-expenses" class="content"></div>
            <div id="content-savings" class="content"></div>
            <div id="content-fixedDeposits" class="content"></div>
            <div id="content-mutualFunds" class="content"></div>
            <div id="content-stocks" class="content"></div>
            <div id="content-crypto" class="content"></div>
            <div id="content-liabilities" class="content"></div>
            <div id="content-creditCards" class="content"></div>
            <div id="content-budgets" class="content"></div>
            <div id="content-rebalancing" class="content"></div>
        </main>
    </div>

    <div id="drillModal" class="modal" onclick="if(event.target===this)window.app.closeDrillModal()">
        <div class="modal-content" style="max-width:560px;">
            <div class="modal-header">
                <h2 id="drillModalTitle">Details</h2>
                <span class="close" onclick="window.app.closeDrillModal()">&times;</span>
            </div>
            <div id="drillModalBody" class="modal-body"></div>
        </div>
    </div>

    <div id="dataModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Entry</h2>
                <span class="close">&times;</span>
            </div>
            <div id="modalBody" class="modal-body"></div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="window.app.saveModalData()">Save</button>
                <button class="btn" onclick="window.app.closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>

</html>
